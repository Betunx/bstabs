@if (songs.length > 0) {
  <div class="space-y-2">
    @for (song of songs; track song.id) {
      <a
        [routerLink]="song.routerLink"
        class="group flex items-center justify-between rounded-xl border border-border bg-card/30 p-4 hover:bg-card hover:border-primary/20 transition-all">

        <div class="flex items-center gap-4 min-w-0">
          <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
            </svg>
          </div>
          <div class="min-w-0">
            <h3 class="text-sm font-semibold text-foreground truncate group-hover:text-primary transition-colors">
              {{ song.title }}
            </h3>
            <p class="text-xs text-muted-foreground">{{ song.artist }}</p>
          </div>
        </div>

        <div class="flex items-center gap-3 shrink-0 ml-4">
          <app-genre-badge [genre]="song.genre" class="hidden sm:inline-flex"/>
          <div class="hidden md:flex items-center gap-3 text-xs text-muted-foreground">
            @if (song.key) { <span>{{ song.key }}</span> }
            @if (song.tempo) { <span>{{ song.tempo }} BPM</span> }
          </div>
          <svg class="h-4 w-4 text-muted-foreground/50 group-hover:text-primary transition-colors"
            fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </div>

      </a>
    }
  </div>
} @else {
  <div class="text-center py-16">
    <svg class="h-16 w-16 mx-auto text-muted-foreground/30 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
    </svg>
    <p class="text-muted-foreground">{{ emptyMessage }}</p>
  </div>
}
