@if (loading()) {
  <div class="container mx-auto px-4 py-12 text-center">
    <p class="text-xl">Cargando tablatura...</p>
  </div>
} @else if (song()) {
  <app-tab-viewer [song]="song()!"></app-tab-viewer>
} @else {
  <div class="container mx-auto px-4 py-12 text-center">
    <p class="text-xl">Tablatura no encontrada</p>
  </div>
}

<!-- Floating theme toggle — útil al leer sin abrir el menú del header -->
<button
  (click)="themeService.toggleTheme()"
  class="fixed bottom-6 right-6 z-40 w-11 h-11 rounded-full shadow-lg flex items-center justify-center transition-all hover:scale-110 active:scale-95"
  style="background: var(--bs-surface); border: 2px solid var(--bs-gold)"
  [title]="'Tema: ' + themeService.currentTheme()">
  @switch (themeService.currentTheme()) {
    @case ('light') {
      <!-- Sol → cambiar a Dark -->
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: var(--bs-text)">
        <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    }
    @case ('dark') {
      <!-- Luna → cambiar a Night Red -->
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" style="color: var(--bs-text)">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    }
    @case ('night') {
      <!-- Ojo rojo → cambiar a OLED -->
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: #cc3333">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>
    }
    @default {
      <!-- OLED → cambiar a Light -->
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" style="color: var(--bs-gold)">
        <rect width="24" height="24" rx="4" fill="currentColor" opacity="0.15"/>
        <path d="M12 6a6 6 0 1 0 0 12A6 6 0 0 0 12 6z"/>
      </svg>
    }
  }
</button>
